  <script>
    // 22 consolidated letters: each entry aggregates letter quiz keys (lk) and dagesh quiz keys (dk)
    var LETTERS22 = [
      { char: 'א', name: 'アレフ',    lk: ['Alef'],                 dk: []           },
      { char: 'ב', name: 'ベート',    lk: ['Bet'],                  dk: ['b','v']    },
      { char: 'ג', name: 'ギメル',    lk: ['Gimel'],                dk: ['g','gh']   },
      { char: 'ד', name: 'ダレト',    lk: ['Dalet'],                dk: ['d','dh']   },
      { char: 'ה', name: 'ヘー',      lk: ['He'],                   dk: []           },
      { char: 'ו', name: 'ワウ',      lk: ['Waw'],                  dk: []           },
      { char: 'ז', name: 'ザイン',    lk: ['Zayin'],                dk: []           },
      { char: 'ח', name: 'ヘート',    lk: ['Het'],                  dk: []           },
      { char: 'ט', name: 'テート',    lk: ['Tet'],                  dk: []           },
      { char: 'י', name: 'ヨード',    lk: ['Yod'],                  dk: []           },
      { char: 'כ', name: 'カフ',      lk: ['Kaf','Kaf sofit'],      dk: ['k','kh']   },
      { char: 'ל', name: 'ラメド',    lk: ['Lamed'],                dk: []           },
      { char: 'מ', name: 'メム',      lk: ['Mem','Mem sofit'],      dk: []           },
      { char: 'נ', name: 'ヌン',      lk: ['Nun','Nun sofit'],      dk: []           },
      { char: 'ס', name: 'サメフ',    lk: ['Samekh'],               dk: []           },
      { char: 'ע', name: 'アイン',    lk: ['Ayin'],                 dk: []           },
      { char: 'פ', name: 'ペー',      lk: ['Pe','Pe sofit'],        dk: ['p','f']    },
      { char: 'צ', name: 'ツァデー',  lk: ['Tsade','Tsade sofit'],  dk: []           },
      { char: 'ק', name: 'コーフ',    lk: ['Qof'],                  dk: []           },
      { char: 'ר', name: 'レーシュ',  lk: ['Resh'],                 dk: []           },
      { char: 'שׁ', name: 'シン/スィン', lk: ['Shin','Sin'],         dk: []           },
      { char: 'ת', name: 'タウ',      lk: ['Tav'],                  dk: ['t','th']   },
    ];
    var VOWELS_DATA = [
      ['בֲ','ハテフ・パタハ','Hateph Patah'],
      ['בֱ','ハテフ・セゴル','Hateph Segol'],
      ['בֳ','ハテフ・カメツ','Hateph Qamets'],
      ['בְ','シェワ','Vocal / Silent Sheva'],
      ['בַ','パタハ','Patah'],
      ['בִ','ヒレク','Hiriq'],
      ['בֻ','キブツ','Qibbuts'],
      ['בֶ','セゴル','Segol'],
      ['בָ','カメツ','Qamets / Qamets Hatuf'],
      ['בֵ','ツェレ','Tsere'],
      ['בֹ','ホレム','Holam'],
      ['בָה','カメツ・ヘー','Qamets He'],
      ['בִי','ヒレク・ヨード','Hiriq Yod'],
      ['בוּ','シュルク','Shuruq'],
      ['בֵי','ツェレ・ヨード','Tsere Yod'],
      ['בוֹ','ホレム・ワウ','Holam Waw'],
    ];

    var masteryData = JSON.parse(localStorage.getItem('alefbet-mastery') || '{}');

    function aggrMastery(lkeys, dkeys) {
      var correct = 0, total = 0;
      lkeys.forEach(function(k) {
        var d = masteryData['letters'] && masteryData['letters'][k];
        if (d) { correct += d.correct; total += d.total; }
      });
      dkeys.forEach(function(k) {
        var d = masteryData['dagesh'] && masteryData['dagesh'][k];
        if (d) { correct += d.correct; total += d.total; }
      });
      return total ? Math.round(correct / total * 100) : null;
    }

    function getMastery(cat, key) {
      var d = masteryData[cat] && masteryData[cat][key];
      return (d && d.total) ? Math.round(d.correct / d.total * 100) : null;
    }

    function colorClass(pct) {
      if (pct === null) return 'pc-none';
      if (pct >= 80)   return 'pc-high';
      if (pct >= 50)   return 'pc-mid';
      return 'pc-low';
    }

    function vowelSlug(nameEn) {
      if (nameEn === 'Vocal / Silent Sheva') return 'sheva';
      return nameEn.toLowerCase().replace(/ \/ .*/, '').replace(/\s+/g, '-');
    }

    function makeCard(char, name, pct, href) {
      var el = document.createElement(href ? 'a' : 'div');
      el.className = 'progress-card ' + colorClass(pct);
      if (href) el.href = href;
      el.innerHTML =
        '<span class="pc-char">' + char + '</span>' +
        '<span class="pc-name">' + name + '</span>' +
        '<span class="pc-stat">' + (pct !== null ? pct + '%' : '—') + '</span>';
      return el;
    }

    var lettersGrid = document.getElementById('letters-grid');
    LETTERS22.forEach(function(item) {
      lettersGrid.appendChild(makeCard(item.char, item.name, aggrMastery(item.lk, item.dk), 'letters/' + item.lk[0].toLowerCase() + '.html'));
    });

    var vowelsGrid = document.getElementById('vowels-grid');
    VOWELS_DATA.forEach(function(item) {
      vowelsGrid.appendChild(makeCard(item[0], item[1], getMastery('vowels', item[2]), 'vowels/' + vowelSlug(item[2]) + '.html'));
    });

    document.getElementById('reset-btn').addEventListener('click', function() {
      if (confirm('習熟度データをすべてリセットしますか？')) {
        localStorage.removeItem('alefbet-mastery');
        location.reload();
      }
    });
  </script>
