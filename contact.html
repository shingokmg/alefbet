<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ — ヘブライ語Alefbet道場</title>
  <meta name="description" content="ヘブライ語Alefbet道場へのお問い合わせはこちらから。">
  <link rel="canonical" href="https://alefbet.jp/contact.html">
  <script>if(localStorage.getItem('hebrew-quiz-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
  <link rel="stylesheet" href="subpage.css">
  <style>
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      margin-top: 1.5rem;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .form-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-heading);
    }
    .form-label-opt {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-sub);
      margin-left: 0.35rem;
    }
    .form-input,
    .form-textarea {
      padding: 0.65rem 0.85rem;
      border: 1.5px solid var(--border-mid);
      border-radius: 0.5rem;
      font-size: 0.95rem;
      color: var(--text-main);
      background: var(--bg-main);
      transition: border-color 0.15s;
      outline: none;
      font-family: inherit;
    }
    .form-input:focus,
    .form-textarea:focus {
      border-color: #17B890;
    }
    .form-textarea {
      resize: vertical;
      min-height: 8rem;
      line-height: 1.7;
    }
    .form-submit {
      display: block;
      width: 100%;
      padding: 0.85rem 2rem;
      background: linear-gradient(135deg, #1de9b6 0%, #17B890 50%, #0d7a60 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(23, 184, 144, 0.35);
      transition: opacity 0.15s;
    }
    .form-submit:hover { opacity: 0.9; }
    .form-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .form-success {
      display: none;
      text-align: center;
      padding: 1.5rem 0 0.5rem;
    }
    .form-success-icon { font-size: 2rem; margin-bottom: 0.6rem; }
    .form-success-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-heading);
      margin-bottom: 0.5rem;
    }
    .form-success-body {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }
    .form-error {
      display: none;
      font-size: 0.85rem;
      color: #e53e3e;
    }
  </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6NCHCEQQXT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6NCHCEQQXT', { anonymize_ip: true });
  </script>
</head>
<body>
  <div class="legal-wrap">
    <header class="legal-header">
      <a class="back-link" href="index.html"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>ヘブライ語Alefbet道場</a>
      <div class="lang-toggle">
        <span class="lang-toggle-btn lang-toggle-btn--active">JA</span>
        <span class="lang-toggle-sep">|</span>
        <a class="lang-toggle-btn" href="en/contact.html" data-lang-link="en">EN</a>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="ダークモード切替">
        <svg class="theme-icon theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="theme-icon theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </header>

    <main class="legal-card">
      <h1 class="legal-title" style="margin-bottom: 1.25rem;">お問い合わせ</h1>

      <form class="contact-form" id="contact-form" novalidate>
        <input type="hidden" name="language" value="ja">
        <div class="form-group">
          <label class="form-label" for="name">お名前<span class="form-label-opt">（任意）</span></label>
          <input class="form-input" type="text" id="name" name="name" autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label" for="email">メールアドレス<span class="form-label-opt">（返信が必要な場合）</span></label>
          <input class="form-input" type="email" id="email" name="email" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="message">お問い合わせ内容<span class="form-label-opt">（必須）</span></label>
          <textarea class="form-textarea" id="message" name="message"></textarea>
        </div>
        <p class="form-error" id="form-error">送信に失敗しました。しばらく経ってから再度お試しください。</p>
        <button class="form-submit" type="submit" id="form-submit">送信する</button>
      </form>

      <div class="form-success" id="form-success">
        <div class="form-success-icon">✉️</div>
        <div class="form-success-title">送信完了</div>
        <p class="form-success-body">お問い合わせありがとうございます。<br>内容を確認のうえ、ご返信いたします。</p>
      </div>
    </main>

    <footer class="legal-footer">
      <div class="legal-footer-links">
        <a class="legal-footer-link" href="index.html" style="display:inline-flex;align-items:center;gap:0.3rem;"><svg width="12" height="12" style="transform:translateY(-1px)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Alefbet道場</a>
        <span class="legal-footer-sep">|</span>
        <a class="legal-footer-link" href="about.html">開発ストーリー</a>
        <span class="legal-footer-sep">|</span>
        <a class="legal-footer-link" href="terms.html">利用規約</a>
        <span class="legal-footer-sep">|</span>
        <a class="legal-footer-link" href="privacy.html">プライバシーポリシー</a>
      </div>
      <div>© 2026 Shingo Kumagai</div>
    </footer>
  </div>

  <script>
    document.querySelectorAll('[data-lang-link]').forEach(function(a) {
      a.addEventListener('click', function() {
        localStorage.setItem('alefbet-lang', a.dataset.langLink);
      });
    });
    document.getElementById('theme-toggle').addEventListener('click', function() {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.removeItem('hebrew-quiz-theme');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('hebrew-quiz-theme', 'dark');
      }
    });

    const form = document.getElementById('contact-form');
    const successMsg = document.getElementById('form-success');
    const errorMsg = document.getElementById('form-error');
    const submitBtn = document.getElementById('form-submit');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const message = document.getElementById('message').value.trim();
      if (!message) {
        document.getElementById('message').focus();
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = '送信中…';
      errorMsg.style.display = 'none';
      try {
        const res = await fetch('https://formspree.io/f/xgolgpan', {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          form.style.display = 'none';
          successMsg.style.display = 'block';
        } else {
          throw new Error();
        }
      } catch(err) {
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = '送信する';
      }
    });
  </script>
</body>
</html>
