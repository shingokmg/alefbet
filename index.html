  <script src="app.js"></script>
  <script>
    (function() {
      var INFO = {
        type: {
          title: '練習内容について',
          body: '<p>上から順に進めるのがオススメです。</p>' +
                '<p>まず文字の名前と発音を覚え、ダゲシュ・母音記号と進んで、最後に<strong>🏆 30秒チャレンジ</strong>でスピードと正確性に磨きをかけましょう。</p>' +
                '<p>「全て表示」の練習項目は、30秒チャレンジには必須ではありません。一旦後回しにしても大丈夫です。</p>'
        },
        mode: {
          title: '出題形式について',
          body: '<p><strong>固定順</strong>：ヘブライ文字はアレフから、母音記号はハテフ・パタハから毎回同じ順番で出題します。慣れるまではこちらがオススメです。</p>' +
                '<p><strong>ランダム</strong>：問題をシャッフルして出題します。</p>'
        },
        font: {
          title: 'フォントについて',
          body: '<p>まずは文字の特徴がつかみやすい <strong>Cardo</strong> からはじめるのがオススメです。</p>' +
                '<p>ヘブライ語はフォントによって字形が大きく変わるため、慣れてきたら複数のフォントにも挑戦してみましょう。</p>'
        }
      };
      var overlay = document.getElementById('info-modal-overlay');
      var titleEl = document.getElementById('info-modal-title');
      var bodyEl = document.getElementById('info-modal-body');

      function openInfo(key) {
        titleEl.textContent = INFO[key].title;
        bodyEl.innerHTML = INFO[key].body;
        overlay.classList.remove('hidden');
      }
      function closeInfo() {
        overlay.classList.add('hidden');
      }

      document.getElementById('info-btn-type').addEventListener('click', function(e) { e.stopPropagation(); openInfo('type'); });
      document.getElementById('info-btn-mode').addEventListener('click', function(e) { e.stopPropagation(); openInfo('mode'); });
      document.getElementById('info-btn-font').addEventListener('click', function(e) { e.stopPropagation(); openInfo('font'); });
      document.getElementById('info-modal-close').addEventListener('click', closeInfo);
      overlay.addEventListener('click', function(e) { if (e.target === overlay) closeInfo(); });
    })();

    (function() {
      var deferredPrompt = null;

      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
      });

      function showInstallSection() {
        var section = document.getElementById('install-section');
        var ua = navigator.userAgent;
        var isIOS = /iPhone|iPad|iPod/.test(ua) && !window.navigator.standalone;
        if (deferredPrompt) {
          section.classList.remove('hidden');
          document.getElementById('install-btn').classList.remove('hidden');
        } else if (isIOS) {
          section.classList.remove('hidden');
          document.getElementById('install-ios').classList.remove('hidden');
        }
      }

      document.getElementById('install-btn').addEventListener('click', function() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(result) {
          deferredPrompt = null;
          document.getElementById('install-section').classList.add('hidden');
        });
      });


      var resultScreen = document.getElementById('result-screen');
      new MutationObserver(function() {
        if (!resultScreen.classList.contains('hidden')) showInstallSection();
      }).observe(resultScreen, { attributes: true, attributeFilter: ['class'] });
    })();

    document.getElementById('extra-section-toggle').addEventListener('click', function() {
      document.getElementById('type-options').classList.toggle('show-all');
      this.classList.toggle('open');
    });
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
